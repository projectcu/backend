# Disable H2 (no in-memory DB anymore)
spring.h2.console.enabled=false

# Azure SQL (values come from GitHub Secrets via env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.generate-ddl=false

# 🔥 VERY IMPORTANT (fix your current error)
# Disable all auto SQL/schema initialization
spring.sql.init.mode=never
spring.datasource.initialization-mode=never

# Disable Spring Security default DB schema creation
spring.security.user.name=admin
spring.security.user.password=admin

# Application Insights
applicationinsights.connection.string=${APPLICATIONINSIGHTS_CONNECTION_STRING:}
