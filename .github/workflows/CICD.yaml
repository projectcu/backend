name: Backend-CICD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build with Maven
        run: mvn clean package -DskipTests=true

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.run_id }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to DEV
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.run_id }}
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/dev/deployment.yaml
          kubectl apply -n dev -f k8s/dev/

          kubectl set env deployment/backend -n dev \
            DB_URL="${{ secrets.DB_URL }}" \
            DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"

      - name: Send Dev Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" = "success" ]; then STATUS=1; fi
          kubectl delete job ci-metrics-job -n monitoring --ignore-not-found
          sed "s/{{STATUS}}/$STATUS/g; s/{{ENV}}/dev/g; s/{{SERVICE}}/backend/g; s/{{RUN_ID}}/${{ github.run_id }}/g" k8s/ci-metrics-job.yaml | kubectl apply -f -

  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: stage

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to STAGE
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.run_id }}
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/stage/deployment.yaml
          kubectl apply -n stage -f k8s/stage/

          kubectl set env deployment/backend -n stage \
            DB_URL="${{ secrets.DB_URL }}" \
            DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"

      - name: Send Stage Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" = "success" ]; then STATUS=1; fi
          kubectl delete job ci-metrics-job -n monitoring --ignore-not-found
          sed "s/{{STATUS}}/$STATUS/g; s/{{ENV}}/stage/g; s/{{SERVICE}}/backend/g; s/{{RUN_ID}}/${{ github.run_id }}/g" k8s/ci-metrics-job.yaml | kubectl apply -f -

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: prod

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to PROD
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.run_id }}
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/prod/deployment.yaml
          kubectl apply -n prod -f k8s/prod/

          kubectl set env deployment/backend -n prod \
            DB_URL="${{ secrets.DB_URL }}" \
            DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"

          kubectl rollout status deployment/backend -n prod --timeout=60s

      - name: Send Prod Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" = "success" ]; then STATUS=1; fi
          kubectl delete job ci-metrics-job -n monitoring --ignore-not-found
          sed "s/{{STATUS}}/$STATUS/g; s/{{ENV}}/prod/g; s/{{SERVICE}}/backend/g; s/{{RUN_ID}}/${{ github.run_id }}/g" k8s/ci-metrics-job.yaml | kubectl apply -f -
